<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>DRiP Royale - Stake Art. Win War.</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        const endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        const websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
        const hasEndpoint = endpoint && !endpoint.startsWith("%");
        const hasWebsiteId = websiteId && !websiteId.startsWith("%");
        if (!hasEndpoint || !hasWebsiteId) return;
        const script = document.createElement("script");
        script.defer = true;
        script.src = endpoint + "/umami";
        script.setAttribute("data-website-id", websiteId);
        document.body.appendChild(script);
      })();
    </script>
  </body>

</html>
